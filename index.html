<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Veloce | Premium Custom Merch</title>
    <link rel="stylesheet" href="style_3.css">
</head>
<body>
    <!-- Banner Restored -->
    <div class="top-banner">
        ✨ DESIGN YOUR OWN GEAR! ✨ | CUSTOM JERSEYS: NO MINIMUM | DM 03160916474!
    </div>

    <header>
        <div class="brand">VELOCE</div>
        <div class="search-bar"><input type="text" id="search" placeholder="Search products..." onkeyup="renderGrid()"></div>
        <div class="nav-links">
            <button onclick="renderGrid('All')">All</button>
            <button onclick="renderGrid('Footwear')">Footwear</button>
            <button onclick="renderGrid('Jerseys')">Jerseys</button>
            <button onclick="renderGrid('Anime Merch')">Anime Merch</button>
        </div>
        <div class="cart-trigger" onclick="openCart()">🛒 View Cart</div>
    </header>

    <!-- Main Title Restored -->
    <div class="main-title">
        BUY YOUR MERCHS AND JERSEYS FROM VELOCE NOW
    </div>

    <div class="stack-scroll">
        <div class="image-wrapper">
            <div class="card"><img src="WhatsApp Image 2026-06-23 at 11.42.34 AM.jpeghh.jpeg"></div>
            <div class="card"><img src="WhatsApp Image 2026-06-23 at 11.42.35 AM.jpeglk.jpeg"></div>
            <div class="card"><img src="WhatsApp Image 2026-06-23 at 11.42.35 AM.jpegnnn.jpeg"></div>
            <div class="card"><img src="WhatsApp Image 2026-06-23 at 11.42.35 AM.jpegnnnn.jpeg"></div>
            <div class="card"><img src="WhatsApp Image 2026-06-23 at 11.42.36 AM.jpegu.jpeg"></div>
        </div>
    </div>

    <div id="product-grid" class="product-grid"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="document.getElementById('modal').style.display='none'">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
